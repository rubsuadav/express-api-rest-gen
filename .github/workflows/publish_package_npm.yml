name: Publish Package to npmjs
on:
  release:
    types: [published]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
    #   - uses: actions/checkout@v6
    #   - uses: actions/setup-node@v5
    #     with:
    #       node-version: 22
    #       registry-url: https://registry.npmjs.org/
    #   - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
